<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sambhav AI</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

  <div class="header">

    <div class="logo">
      ✨ Sambhav AI
    </div>

    <div class="status">
      🟢 Online
    </div>

  </div>

  <div id="mood">
    😊 Mood: Friendly
  </div>

  <div id="chat" class="chat">

    <div class="ai-msg">
      👋 Hello! I'm Sambhav AI.<br><br>

      I can answer questions, chat naturally,
      and help you with many tasks.
    </div>

  </div>

  <div class="input-area">

    <input
      type="text"
      id="userInput"
      placeholder="Message Sambhav AI..."
      autocomplete="off"
    >

    <button id="sendBtn">
      ➤
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>

</html>
